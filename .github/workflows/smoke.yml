name: smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  env-free-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
      - name: Run env-free smoke gate
        env:
          # CI never has a real .env. The env-free smokes must still pass.
          CODEX_TELEGRAM_SMOKE_NOENV: "1"
        run: make smoke
